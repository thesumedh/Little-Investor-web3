name: Soroban Contracts CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Run Certificate Contract Tests
      run: |
        cd contracts/certificate
        cargo test

    - name: Run Vault Contract Tests
      run: |
        cd contracts/vault
        cargo test
